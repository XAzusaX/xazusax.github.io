<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reverie Archive</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="/assets/logo.ico" type="image/x-icon">
</head>

<body>

  <!-- 背景 -->
  <div class="bg"></div>

  <!-- 导航 -->
 <header class="nav">

  <!-- LEFT: logo -->
  <a href="index.html" class="logo">
    <img src="assets/logo.png" alt="logo" />
    <span>Reverie Archive</span>
  </a>

  <!-- MOBILE hamburger -->
  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>

</header>

<!-- MOBILE overlay (一定要移出 header) -->
<div class="overlay" id="overlay"></div>

<!-- MOBILE side menu -->
<div class="side-menu" id="sideMenu">

  <a href="index.html" class="menu-item">
    <img src="assets/icons/home.svg" class="icon" />
    <span>Home</span>
  </a>

  <a href="page/lib.html" class="menu-item">
    <img src="assets/icons/library.svg" class="icon" />
    <span>Library</span>
  </a>

</div>
  <!-- 主体 -->
  <main class="page">

    <!-- HERO -->
    <section class="hero reveal active">
      <h1 class="title">Welcome.</h1>
      <p class="quote typewriter" id="homeQuote">
        A quiet archive of unfinished worlds.
      </p>
      <div class="scroll-indicator">↓ Scroll to Explore ↓</div>
    </section>

    <!-- Footer -->
    <footer class="footer reveal">
      <p>© 2026 Reverie Archive</p>
      <p class="sub">Some stories remain unread, waiting in silence.</p>
    </footer>

  </main>

  <!-- Scripts -->
  <script src="js/script.js"></script>
  <script src="js/init.js"></script>

</body>
</html>
