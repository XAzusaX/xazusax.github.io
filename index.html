<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reverie Archive</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- 背景 -->
  <div class="bg"></div>

  <!-- 导航 -->
  <header class="nav">

    <a href="index.html" class="logo">
      <img src="assets/logo.png" alt="logo" />
      <span>Reverie Archive</span>
    </a>

    <nav class="links">
      <a href="index.html" class="nav-item active">
        <img src="assets/icons/home.svg" class="icon" />
        Home
      </a>

      <a href="page/novel.html" class="nav-item">
        <img src="assets/icons/library.svg" class="icon" />
        Library
      </a>
    </nav>

  </header>

  <!-- 主体 -->
  <main class="page">

    <!-- HERO -->
    <section class="hero reveal active">
      <h1 class="title">Welcome.</h1>
      <p class="quote typewriter" id="homeQuote">
        A quiet archive of unfinished worlds.
      </p>
      <div class="scroll-indicator">↓ Scroll to Explore ↓</div>
    </section>

    <!-- =========================
         Latest Updates (DYNAMIC)
    ========================= -->
    <section class="section glass reveal">
      <h2>Latest Updates</h2>

      <!-- JS inject here -->
      <div class="timeline" id="timeline"></div>
    </section>

    <!-- Footer -->
    <footer class="footer reveal">
      <p>© 2026 Reverie Archive</p>
      <p class="sub">Some stories remain unread, waiting in silence.</p>
    </footer>

  </main>

  <!-- Scripts -->
  <script src="js/script.js"></script>
  <script src="js/init.js"></script>

</body>
</html>
