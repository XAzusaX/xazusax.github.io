<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TNE Reader</title>

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/reader.css" />
  <link rel="icon" href="/assets/logo.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="bg"></div>

  <!-- =========================
       NAVIGATION
  ========================= -->
<header class="nav">
    <!-- LEFT: logo -->
  <a href="../index.html" class="logo">
    <img src="../assets/logo.png" alt="logo" />
    <span>Reverie Archive</span>
  </a>

  <!-- MOBILE hamburger -->
  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>

</header>

<!-- MOBILE overlay (一定要移出 header) -->
<div class="overlay" id="overlay"></div>

<!-- MOBILE side menu -->
<div class="side-menu" id="sideMenu">

  <a href="../index.html" class="menu-item">
    <img src="../assets/icons/home.svg" class="icon" />
    <span>Home</span>
  </a>

  <a href="lib.html" class="menu-item">
    <img src="../assets/icons/library.svg" class="icon" />
    <span>Library</span>
  </a>

</div>

  <!-- =========================
       READER
  ========================= -->
  <main class="reader">

    <!-- TOP BAR -->
    <div class="topbar">
      <a class="btn" id="prevTop">← Prev</a>
      <div class="chapter-title" id="chapterTitle">Loading...</div>
      <a class="btn" id="nextTop">Next →</a>
    </div>

    <!-- CONTENT -->
    <div class="content" id="contentBox">
      Loading chapter...
    </div>

    <!-- BOTTOM BAR -->
    <div class="bottombar">
      <a class="btn" id="prevBottom">← Prev</a>
      <a class="btn" id="backBtn">Back</a>
      <a class="btn" id="nextBottom">Next →</a>
    </div>

    <footer class="footer reveal">
      <p>© 2026 Reverie Archive</p>
    </footer>
  </main>
  <script src="/js/reader.js"></script>
  <script src="/js/init.js"></script>
  <script src="/js/script.js"></script>

</body>
</html>
