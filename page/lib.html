<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RA - Library</title>

  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/lib.css" />
  <link rel="icon" href="/assets/logo.ico" type="image/x-icon">
</head>

<body>

  <!-- =========================
       BACKGROUND
  ========================= -->
  <div class="bg"></div>

  <!-- =========================
       NAVIGATION
  ========================= -->
<header class="nav">

  <!-- LEFT: logo -->
  <a href="../index.html" class="logo">
    <img src="../assets/logo.png" alt="logo" />
    <span>Reverie Archive</span>
  </a>



  <!-- MOBILE hamburger -->
  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>

</header>

<!-- MOBILE overlay (一定要移出 header) -->
<div class="overlay" id="overlay"></div>

<!-- MOBILE side menu -->
<div class="side-menu" id="sideMenu">

  <a href="../index.html" class="menu-item">
    <img src="../assets/icons/home.svg" class="icon" />
    <span>Home</span>
  </a>

  <a href="lib.html" class="menu-item">
    <img src="../assets/icons/library.svg" class="icon" />
    <span>Library</span>
  </a>

</div>

  <!-- =========================
       MAIN
  ========================= -->
  <main class="page">

    <!-- HERO -->
    <section class="hero reveal active">

      <h1 class="title">Library</h1>

      <p class="quote typewriter" id="libQuote">
        Every fragment here once meant something.
      </p>

      <div class="scroll-indicator">↓ Scroll to Explore ↓</div>

    </section>

    <!-- =========================
         LIBRARY SECTION
    ========================= -->
    <section class="section glass reveal">

      <h2>Featured Archives</h2>

      <p class="subtext">
        Stories stored inside Reverie Archive
      </p>

      <!-- 🔥 关键：这里只保留容器，不再写死卡片 -->
      <div class="library-grid" id="libraryGrid"></div>

    </section>

    <!-- =========================
         FOOTER
    ========================= -->
    <footer class="footer reveal">

      <p>© 2026 Reverie Archive</p>
    </footer>

  </main>

  <!-- =========================
       SCRIPTS
  ========================= -->
  <script src="../js/lib.js"></script>
  <script src="../js/init.js"></script>
  <script src="../js/script.js"></script>

</body>
</html>
