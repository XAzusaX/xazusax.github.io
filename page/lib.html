<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RA - Library</title>

  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/lib.css" />
  <link rel="icon" href="/assets/logo.ico" type="image/x-icon">
</head>

<body>

  <!-- =========================
       BACKGROUND
  ========================= -->
  <div class="bg"></div>

  <!-- =========================
       NAVIGATION
  ========================= -->
<header id="nav"></header>

<div id="overlay"></div>
<div id="sideMenu"></div>

  <!-- =========================
       MAIN
  ========================= -->
  <main class="page">

    <!-- HERO -->
    <section class="hero reveal active">

      <h1 class="title">Library</h1>

      <p class="quote typewriter" id="libQuote">
        Every fragment here once meant something.
      </p>

      <div class="scroll-indicator">↓ Scroll to Explore ↓</div>

    </section>

    <!-- =========================
         LIBRARY SECTION
    ========================= -->
    <section class="section glass reveal">

      <h2>Featured Archives</h2>

      <p class="subtext">
        Stories stored inside Reverie Archive
      </p>

      <!-- 🔥 关键：这里只保留容器，不再写死卡片 -->
      <div class="library-grid" id="libraryGrid"></div>

    </section>

    <!-- =========================
         FOOTER
    ========================= -->
  <footer id="footer"></footer>

  </main>

  <!-- =========================
       SCRIPTS
  ========================= -->
  <script src="../js/lib.js"></script>
  <script src="../js/init.js"></script>
  <script src="../js/script.js"></script>
  <script src="/js/nav.js"></script>

</body>
</html>
