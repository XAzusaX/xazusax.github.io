<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ARCHIVE://BOOK</title>

    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/book.css" />
    <link rel="icon" href="/assets/logo.ico" type="image/x-icon">
</head>

<body>

  <div class="bg"></div>

  <!-- =========================
       NAVIGATION
  ========================= -->
<header class="nav">

  <!-- LEFT: logo -->
  <a href="../index.html" class="logo">
    <img src="../assets/logo.png" alt="logo" />
    <span>Reverie Archive</span>
  </a>

  <!-- MOBILE hamburger -->
  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>

</header>

<!-- MOBILE overlay (一定要移出 header) -->
<div class="overlay" id="overlay"></div>

<!-- MOBILE side menu -->
<div class="side-menu" id="sideMenu">

  <a href="../index.html" class="menu-item">
    <img src="../assets/icons/home.svg" class="icon" />
    <span>Home</span>
  </a>

  <a href="lib.html" class="menu-item">
    <img src="../assets/icons/library.svg" class="icon" />
    <span>Library</span>
  </a>

</div>

  <!-- =========================
       ARCHIVE TERMINAL
  ========================= -->
  
  <main class="terminal">
    <section class="backLib">
      <div class="scroll-indicator">
        <a href="/page/lib.html">← Click to return to Library</a>
      </div>
    </section>
    
    <!-- HEADER -->
    <div class="panel">
      <div class="header-id" id="bookCode">ARCHIVE NODE / ----</div>
      <div class="title" id="bookTitle">LOADING...</div>
      <div class="status">
        STATUS: <span id="bookStatus">UNKNOWN</span><br><br> ACCESS: <span>GRANTED</span>
      </div>
    </div>

    <!-- COVER -->
    <div class="panel cover-box" id="bookCover"></div>

    <!-- DESCRIPTION -->
    <div class="panel">
      <div class="desc" id="bookDesc">
        Loading archive data...
      </div>
    </div>

    <!-- META -->
    <div class="panel">
      <div class="meta-grid" id="bookMeta">

        <!-- JS inject -->

      </div>
    </div>

    <!-- CHAPTER LIST -->
    <div class="panel">
      <div class="chapter-list" id="chapterList">

        <!-- JS inject -->

      </div>
    </div>

    <div class="footer-note">
      // archive node remains partially unstable — do not attempt full reconstruction //
    </div>

    <footer class="footer reveal">
      <p>© 2026 Reverie Archive</p>
    </footer>

  </main>

  <script src="/js/script.js"></script>
  <script src="/js/init.js"></script>
  <script src="/js/book.js"></script>

</body>
</html>
